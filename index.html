<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
html,
body {
  background: #202124;
  height: 100dvh;
  margin: 0;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;
  width: 100%;
}

:root {
  --gc-edge-gap: 16px;
  --gc-scale: 1;
  --gc-stage-height: 852px;
  --gc-stage-width: 393px;
}

#pyxel-screen {
  height: var(--gc-stage-height) !important;
  left: 50% !important;
  max-height: var(--gc-stage-height) !important;
  max-width: var(--gc-stage-width) !important;
  overflow: hidden !important;
  position: fixed !important;
  top: 50% !important;
  transform: translate(-50%, -50%) scale(var(--gc-scale)) !important;
  transform-origin: center center !important;
  width: var(--gc-stage-width) !important;
}

#canvas,
#pyxel-screen canvas {
  display: block !important;
  height: 100% !important;
  image-rendering: pixelated;
  max-height: var(--gc-stage-height) !important;
  max-width: var(--gc-stage-width) !important;
  object-fit: contain !important;
  width: 100% !important;
}
</style>
<script>
(() => {
  const BASE_WIDTH = 393;
  const BASE_HEIGHT = 852;
  const EDGE_GAP = 16;
  let fitEnabled = false;

  const isPyxelScreenReady = () => {
    const canvas = document.getElementById("canvas");
    return canvas && canvas.width >= BASE_WIDTH && canvas.height >= BASE_HEIGHT;
  };

  const updateGravityCourierFit = () => {
    const viewport = window.visualViewport;
    const width = viewport ? viewport.width : window.innerWidth;
    const height = viewport ? viewport.height : window.innerHeight;
    const availableWidth = Math.max(1, width - EDGE_GAP);
    const availableHeight = Math.max(1, height - EDGE_GAP);
    const scale = Math.min(1, availableWidth / BASE_WIDTH, availableHeight / BASE_HEIGHT);
    fitEnabled = fitEnabled || isPyxelScreenReady();
    document.documentElement.style.setProperty("--gc-scale", fitEnabled ? scale.toFixed(4) : "1");
  };

  window.addEventListener("resize", updateGravityCourierFit, { passive: true });
  window.addEventListener("orientationchange", updateGravityCourierFit, { passive: true });
  window.addEventListener("pointerup", () => requestAnimationFrame(updateGravityCourierFit), { passive: true });
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", updateGravityCourierFit, { passive: true });
    window.visualViewport.addEventListener("scroll", updateGravityCourierFit, { passive: true });
  }
  setInterval(updateGravityCourierFit, 250);
})();
</script>
