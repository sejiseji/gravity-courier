<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gravity Courier</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #05070f;
        color: #f3f6ff;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      pyxel-run {
        display: block;
      }
    </style>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>
    <pyxel-run root="." name="main.py"></pyxel-run>
  </body>
</html>
